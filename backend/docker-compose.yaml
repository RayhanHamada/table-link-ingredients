version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tablelink-db
    environment:
      POSTGRES_DB: tablelink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../tablelink-test.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tablelink"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
